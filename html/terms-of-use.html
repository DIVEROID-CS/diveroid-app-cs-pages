<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Terms of Use — DIVEROID</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
  </head>
  <body>
    <!-- App Bar -->
    <div class="page-header">
      <button class="btn-close" onclick="closePage()">✕</button>
      <h1>Terms of Use</h1>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar">
      <button
        class="tab-btn active"
        onclick="setTab('purchase')"
        id="tab-purchase-btn"
      >
        Purchase and Refund Policy
      </button>
      <button
        class="tab-btn"
        onclick="setTab('warranty')"
        id="tab-warranty-btn"
      >
        DIVEROID Product Warranty
      </button>
    </div>

    <!-- Language Switcher -->
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">English</button>
      <button class="lang-btn" onclick="setLang('ko')">한국어</button>
    </div>

    <div class="content-wrapper" id="content-root"></div>

    <script src="../assets/js/bridge.js"></script>
    <script src="../assets/i18n/terms-of-use.js"></script>
    <script>
      var currentLang = "en";
      var currentTab = "purchase";

      function render() {
        var data = window.PAGE_CONTENT[currentLang];
        if (!data) return;

        var tabData = data.tabs[currentTab];
        if (!tabData) return;

        var html = "";
        tabData.sections.forEach(function (sec, i) {
          html += '<div class="section">';
          html += "<h2>" + sec.heading + "</h2>";
          html += sec.body;
          html += "</div>";
          if (i < tabData.sections.length - 1) {
            html += '<div class="section-divider"></div>';
          }
        });
        html +=
          '<div class="contact-cta">' +
          "<p>" +
          tabData.cta.text +
          "</p>" +
          '<button class="btn-contact" onclick="openInquiry()">' +
          tabData.cta.button +
          "</button>" +
          "</div>";

        document.getElementById("content-root").innerHTML = html;

        // Update tab labels for current language
        var labels = data.tabLabels;
        document.getElementById("tab-purchase-btn").textContent =
          labels.purchase;
        document.getElementById("tab-warranty-btn").textContent =
          labels.warranty;
      }

      function setTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab-btn").forEach(function (btn) {
          btn.classList.remove("active");
        });
        document.getElementById("tab-" + tab + "-btn").classList.add("active");
        render();
      }

      function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll(".lang-btn").forEach(function (btn) {
          btn.classList.remove("active");
        });
        document
          .querySelector("[onclick=\"setLang('" + lang + "')\"]")
          .classList.add("active");
        render();
        window.ReactNativeWebView &&
          window.ReactNativeWebView.postMessage(
            JSON.stringify({ type: "langChanged", lang: lang }),
          );
      }

      onBridgeMessage("setLang", setLang);
      onBridgeMessage("setTab", setTab);

      // Init
      (function () {
        var params = new URLSearchParams(window.location.search);
        var lang = params.get("lang");
        var tab = params.get("tab");
        currentLang = lang === "ko" ? "ko" : "en";
        if (!lang && (navigator.language || "").startsWith("ko"))
          currentLang = "ko";
        if (tab === "warranty") currentTab = "warranty";

        // Sync lang button state
        document.querySelectorAll(".lang-btn").forEach(function (btn) {
          btn.classList.remove("active");
        });
        document
          .querySelector("[onclick=\"setLang('" + currentLang + "')\"]")
          .classList.add("active");

        // Sync tab button state
        document.querySelectorAll(".tab-btn").forEach(function (btn) {
          btn.classList.remove("active");
        });
        document
          .getElementById("tab-" + currentTab + "-btn")
          .classList.add("active");

        render();
      })();
    </script>
  </body>
</html>
