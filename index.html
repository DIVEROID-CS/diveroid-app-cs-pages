<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIVEROID App 3.0 — CS Pages</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 40px 20px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 6px;
      }
      .sub {
        color: #888;
        font-size: 14px;
        margin-bottom: 32px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
        max-width: 700px;
      }
      a.card {
        display: block;
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 12px;
        padding: 18px 20px;
        text-decoration: none;
        color: #000;
        transition: box-shadow 0.15s;
      }
      a.card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .card-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .card-desc {
        font-size: 13px;
        color: #888;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        background: #f0f0f0;
        color: #666;
        padding: 2px 8px;
        border-radius: 10px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>DIVEROID App 3.0 — CS Pages</h1>
    <div class="sub">My Page / Customer Service HTML pages · EN / KO</div>
    <div class="grid">
      <a class="card" href="html/privacy-policy.html">
        <div class="card-title">Privacy Policy</div>
        <div class="card-desc">개인정보처리방침</div>
        <span class="badge">Mypage → 앱 정보</span>
      </a>
      <a class="card" href="html/open-source-license.html">
        <div class="card-title">Open Source License</div>
        <div class="card-desc">오픈소스 라이선스</div>
        <span class="badge">Mypage → 앱 정보</span>
      </a>
      <a class="card" href="html/terms-of-use.html">
        <div class="card-title">Terms of Use</div>
        <div class="card-desc">구매/환불 정책 + 제품 보증 (탭)</div>
        <span class="badge">Mypage → 앱 정보</span>
      </a>
      <a class="card" href="html/faq.html">
        <div class="card-title">FAQ</div>
        <div class="card-desc">자주 묻는 질문</div>
        <span class="badge">Mypage → 고객센터</span>
      </a>
      <a class="card" href="html/tutorial.html">
        <div class="card-title">Tutorial</div>
        <div class="card-desc">사용 가이드 (스크린샷 pending)</div>
        <span class="badge">Tutorial</span>
      </a>
    </div>
  </body>
</html>
